<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wizard">
<title>Spelling Quest ⚔️</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
    color: #f5f0e0;
    -webkit-tap-highlight-color: transparent;
    overflow-x: hidden;
    background: radial-gradient(ellipse at top, #2a1851 0%, #0f0822 60%, #050316 100%);
    background-attachment: fixed;
    user-select: none;
    -webkit-user-select: none;
  }
  body {
    display: flex; flex-direction: column;
    min-height: 100vh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    position: relative;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 60% 70%, #fff, transparent),
      radial-gradient(1px 1px at 50% 20%, #fff, transparent),
      radial-gradient(1px 1px at 80% 10%, #fff, transparent),
      radial-gradient(1px 1px at 90% 50%, #fff, transparent),
      radial-gradient(1px 1px at 10% 80%, #fff, transparent),
      radial-gradient(1px 1px at 33% 60%, #ffd, transparent),
      radial-gradient(2px 2px at 75% 35%, #ffd, transparent);
    background-size: 400px 400px; opacity: 0.4;
  }

  /* ── HEADER ───────────────────────────────────────── */
  header {
    padding: 10px 16px;
    background: rgba(15, 8, 34, 0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(240, 208, 96, 0.2);
    position: relative; z-index: 10;
    display: flex; align-items: center; gap: 10px;
  }
  .title-mini {
    font-size: 14px; font-weight: 800;
    color: #f0d060;
    flex: 1;
  }
  .header-stats { display: flex; gap: 6px; }
  .stat-pill {
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px; font-weight: 800;
    border: 1px solid;
  }
  .stat-xp { background: rgba(240, 208, 96, 0.15); border-color: rgba(240, 208, 96, 0.4); color: #f0d060; }
  .stat-coin { background: rgba(255, 165, 0, 0.2); border-color: rgba(255, 165, 0, 0.5); color: #ffc850; }
  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(240, 208, 96, 0.15);
    border: 1px solid rgba(240, 208, 96, 0.3);
    color: #f0d060;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── MAIN BATTLE AREA ──────────────────────────────── */
  main {
    flex: 1; padding: 14px;
    display: flex; flex-direction: column; gap: 10px;
    position: relative; z-index: 1;
  }

  .battle-info {
    text-align: center;
    font-size: 13px; font-weight: 700;
    color: #b9adcc;
    margin-bottom: -4px;
  }

  /* ── MONSTER CARD ──────────────────────────────────── */
  .monster-card {
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
    border-radius: 20px;
    padding: 18px 16px 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .monster-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center top, var(--monster-color, #ba55d3) 0%, transparent 60%);
    opacity: 0.25;
    pointer-events: none;
  }
  .monster-art {
    font-size: 110px;
    line-height: 1;
    margin: 8px 0;
    position: relative;
    display: inline-block;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
  }
  .monster-art.hit { animation: monsterHit 0.5s; }
  @keyframes monsterHit {
    0%, 100% { transform: translate(0); filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); }
    20% { transform: translate(-12px, -4px); filter: drop-shadow(0 0 20px #ff4d4d) hue-rotate(180deg) brightness(2); }
    40% { transform: translate(10px, 2px); filter: drop-shadow(0 0 20px #ff4d4d) hue-rotate(180deg) brightness(2); }
    60% { transform: translate(-6px, 0); filter: drop-shadow(0 0 20px #ff4d4d); }
    80% { transform: translate(4px, 0); }
  }
  .monster-art.defeated {
    animation: monsterDefeat 1s forwards;
  }
  @keyframes monsterDefeat {
    0% { opacity: 1; transform: scale(1); filter: brightness(1); }
    50% { opacity: 1; transform: scale(1.2) rotate(15deg); filter: brightness(3) sepia(1); }
    100% { opacity: 0; transform: scale(0.3) rotate(45deg) translateY(80px); }
  }
  .monster-art img { width: 110px; height: 110px; object-fit: contain; }

  .monster-name {
    font-size: 22px; font-weight: 900;
    color: #fff;
    margin-bottom: 2px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .monster-title {
    font-size: 11px; font-weight: 700;
    color: #b9adcc;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .hp-row { display: flex; align-items: center; gap: 8px; padding: 0 16px; }
  .hp-label { font-size: 11px; font-weight: 800; color: #ff7777; min-width: 32px; }
  .hp-bar {
    flex: 1; height: 12px;
    background: rgba(0,0,0,0.4);
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(255, 119, 119, 0.5);
  }
  .hp-fill {
    height: 100%;
    background: linear-gradient(90deg, #ff3030, #ff8800);
    transition: width 0.6s ease-out;
    box-shadow: 0 0 8px rgba(255, 100, 0, 0.6);
  }
  .hp-num { font-size: 12px; font-weight: 900; color: #fff; min-width: 50px; text-align: right; }

  .monster-intro {
    margin-top: 10px;
    padding: 8px 12px;
    background: rgba(0, 0, 0, 0.3);
    border-radius: 12px;
    font-size: 13px;
    color: #f0d060;
    font-style: italic;
  }

  /* ── DAMAGE NUMBERS ─────────────────────────────────── */
  .damage-num {
    position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px; font-weight: 900;
    color: #ff3030;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 12px #ff8800;
    pointer-events: none;
    animation: dmgFloat 1.2s ease-out forwards;
    z-index: 100;
  }
  @keyframes dmgFloat {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }
  .damage-num.heal { color: #4ade80; text-shadow: 0 2px 8px rgba(0,0,0,0.8), 0 0 12px #00ff88; }

  /* ── CHALLENGE CARD ────────────────────────────────── */
  .challenge-card {
    background: rgba(255, 255, 255, 0.96);
    border-radius: 20px;
    padding: 18px 16px;
    color: #2a2118;
    box-shadow: 0 4px 30px rgba(106, 62, 176, 0.2);
    border: 1px solid rgba(240, 208, 96, 0.3);
  }

  .challenge-mode {
    text-align: center; font-size: 11px; font-weight: 800;
    color: #6b3eb0; letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .speak-row { text-align: center; margin: 10px 0; }
  .speak-btn {
    width: 84px; height: 84px;
    border-radius: 42px;
    background: linear-gradient(135deg, #ba55d3, #6b3eb0);
    border: 3px solid #f0d060;
    font-size: 38px;
    color: #fff;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(186, 85, 211, 0.5);
  }
  .speak-btn:active { transform: scale(0.95); }
  .speak-btn.speaking { animation: glow 0.8s infinite; }
  @keyframes glow {
    0%, 100% { box-shadow: 0 4px 20px rgba(186, 85, 211, 0.5); }
    50% { box-shadow: 0 4px 36px rgba(255, 215, 0, 0.8), 0 0 0 8px rgba(255, 215, 0, 0.15); }
  }

  .meaning {
    text-align: center; margin-top: 6px;
    font-size: 13px; color: #5a4a3c; line-height: 1.4;
  }

  /* ── Custom Display (替代 input，避免系统键盘候选词)─── */
  .spell-display {
    width: 100%;
    min-height: 56px;
    padding: 12px;
    text-align: center;
    border: 2px solid #d9cbbb;
    border-radius: 12px;
    background: #faf6f0;
    color: #2a2118;
    margin-top: 10px;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    display: flex; align-items: center; justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  .spell-display .typed { color: #2a2118; }
  .spell-display .cursor {
    display: inline-block;
    width: 2px; height: 28px;
    background: #6b3eb0;
    margin-left: 2px; vertical-align: middle;
    animation: blink 1s infinite;
  }
  @keyframes blink { 0%,49%{opacity:1;} 50%,100%{opacity:0;} }
  .spell-display.correct { border-color: #4a7c59; background: #e8f5e9; color: #2d6a3f; animation: pop 0.3s; }
  .spell-display.wrong { border-color: #c0392b; background: #fdecea; color: #c0392b; animation: shake 0.4s; }

  /* ── Custom Keyboard (Magic Runes) ────────────────── */
  .keyboard {
    margin-top: 10px;
    padding: 8px 6px 6px;
    background: linear-gradient(180deg, rgba(106, 62, 176, 0.08), rgba(106, 62, 176, 0.15));
    border-radius: 14px;
    border: 1px solid rgba(106, 62, 176, 0.2);
  }
  .kb-row {
    display: flex; gap: 4px; justify-content: center;
    margin-bottom: 4px;
  }
  .kb-row:last-child { margin-bottom: 0; }
  .key {
    flex: 1;
    min-width: 0;
    max-width: 38px;
    height: 44px;
    background: linear-gradient(180deg, #fff, #f0e8da);
    border: 1px solid #c9b8a0;
    border-bottom: 3px solid #8d6b4c;
    border-radius: 8px;
    font-size: 16px; font-weight: 800;
    color: #2a2118;
    cursor: pointer;
    font-family: inherit;
    text-transform: lowercase;
    padding: 0;
    transition: transform 0.05s, box-shadow 0.05s;
  }
  @media (max-width: 480px) {
    .key { height: 48px; max-width: 42px; font-size: 17px; }
    .key.special { max-width: 60px; }
    .key.special.go { max-width: 90px; }
    .kb-row { gap: 5px; margin-bottom: 5px; }
  }
  @media (max-width: 360px) {
    .key { height: 44px; max-width: 38px; font-size: 15px; }
    .kb-row { gap: 3px; margin-bottom: 3px; }
  }
  .key:active {
    transform: translateY(2px);
    border-bottom-width: 1px;
    background: linear-gradient(180deg, #f0e8da, #e3d6bc);
  }
  .key.special {
    max-width: 56px;
    font-size: 14px;
    background: linear-gradient(180deg, #6b3eb0, #4a2575);
    color: #f0d060;
    border-color: #4a2575;
    border-bottom-color: #2a1851;
  }
  .key.special.go {
    background: linear-gradient(180deg, #ff4444, #c01818);
    color: #fff;
    border-color: #c01818;
    border-bottom-color: #800;
    max-width: 76px;
  }
  .key.dim { opacity: 0.35; pointer-events: none; }

  /* ── Original Input (保留，但隐藏 — 仅 fallback) ─── */
  .spell-input {
    width: 100%;
    padding: 14px;
    font-size: 22px; text-align: center;
    border: 2px solid #d9cbbb;
    border-radius: 12px;
    background: #faf6f0;
    font-family: inherit;
    letter-spacing: 1px;
    outline: none;
    color: #2a2118;
    margin-top: 10px;
  }
  .spell-input:focus { border-color: #6b3eb0; background: #fff; }
  .spell-input.correct { border-color: #4a7c59; background: #e8f5e9; color: #2d6a3f; animation: pop 0.3s; }
  .spell-input.wrong { border-color: #c0392b; background: #fdecea; color: #c0392b; animation: shake 0.4s; }
  @keyframes pop { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
  @keyframes shake {
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-8px);}
    40%{transform:translateX(8px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }

  /* Puzzle */
  .puzzle-slots {
    display: flex; gap: 6px; justify-content: center; flex-wrap: wrap;
    min-height: 56px; padding: 12px;
    border: 2px dashed #d9cbbb; border-radius: 12px;
    background: #faf6f0; margin: 10px 0;
  }
  .puzzle-slot {
    min-width: 50px; padding: 8px 12px;
    background: linear-gradient(135deg, #6b3eb0, #4a2575);
    color: #f0d060;
    border-radius: 10px;
    font-size: 18px; font-weight: 700; cursor: pointer;
  }
  .puzzle-bank { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
  .puzzle-piece {
    min-width: 50px; padding: 12px 14px;
    background: #fff;
    border: 2px solid #ba55d3;
    color: #6b3eb0;
    border-radius: 12px;
    font-size: 18px; font-weight: 700; cursor: pointer;
  }
  .puzzle-piece:active { transform: scale(0.92); }
  .puzzle-piece.used { opacity: 0.25; pointer-events: none; }

  /* Trap */
  .trap-word {
    display: flex; gap: 3px; justify-content: center; flex-wrap: wrap;
    font-size: 28px; font-weight: 700; color: #2a2118;
    letter-spacing: 1px; padding: 16px 8px;
  }
  .trap-letter { min-width: 18px; text-align: center; }
  .trap-blank {
    display: inline-block;
    width: 32px; height: 38px;
    text-align: center;
    border: 2px solid #c0392b; border-radius: 8px;
    background: #fff;
    font-size: 24px; font-weight: 700; color: #c0392b;
    font-family: inherit; padding: 0; outline: none;
  }
  .trap-blank:focus { background: #fdecea; border-width: 3px; }
  .trap-blank.correct { background: #e8f5e9; border-color: #4a7c59; color: #2d6a3f; }
  .trap-blank.wrong { background: #fdecea; }

  /* ── Action Buttons ────────────────── */
  .actions { display: flex; gap: 10px; margin-top: 12px; }
  .btn {
    flex: 1; padding: 14px;
    border: none; border-radius: 12px;
    font-size: 16px; font-weight: 900;
    cursor: pointer; font-family: inherit;
  }
  .btn-attack {
    background: linear-gradient(135deg, #ff4444, #c01818);
    color: #fff;
    box-shadow: 0 4px 16px rgba(255, 68, 68, 0.4);
    border: 2px solid #ff8888;
    letter-spacing: 1px;
  }
  .btn-attack:active { transform: scale(0.97); }
  .btn-next {
    background: linear-gradient(135deg, #ba55d3, #6b3eb0);
    color: #fff;
    box-shadow: 0 4px 16px rgba(186, 85, 211, 0.4);
  }
  .btn-secondary { background: #f0e8da; color: #6b3eb0; }
  .btn:disabled { background: #d9cbbb !important; color: #8d6b4c !important; }

  /* ── PLAYER STATUS BAR (Hearts) ───────────────────── */
  .player-status {
    background: rgba(15, 8, 34, 0.85);
    border-radius: 16px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
    border: 1px solid rgba(240, 208, 96, 0.3);
  }
  .hearts { display: flex; gap: 4px; flex: 1; }
  .heart {
    font-size: 28px;
    transition: transform 0.3s, opacity 0.3s;
  }
  .heart.lost {
    opacity: 0.2;
    filter: grayscale(1);
    animation: heartBreak 0.6s;
  }
  @keyframes heartBreak {
    0% { transform: scale(1); }
    30% { transform: scale(1.4) rotate(-20deg); }
    60% { transform: scale(0.3) rotate(40deg); }
    100% { transform: scale(1) rotate(0); }
  }
  .player-label { font-size: 11px; color: #b9adcc; font-weight: 800; letter-spacing: 1px; }

  /* ── OVERLAY (Victory / Defeat / Intro) ───────────── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.85);
    z-index: 250;
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .overlay.open { display: flex; }
  .overlay-card {
    max-width: 360px; width: 100%;
    background: linear-gradient(135deg, #2a1851, #1a0f3a);
    border: 2px solid #f0d060;
    border-radius: 24px;
    padding: 28px 22px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 60px rgba(240, 208, 96, 0.4);
  }
  .ov-emoji { font-size: 78px; line-height: 1; }
  .ov-title {
    font-size: 32px; font-weight: 900;
    margin-top: 12px;
    background: linear-gradient(135deg, #ffd700, #ff7eb9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .ov-msg { font-size: 14px; color: #b9adcc; margin-top: 10px; line-height: 1.5; }
  .ov-rewards {
    margin-top: 18px;
    padding: 14px;
    background: rgba(240, 208, 96, 0.1);
    border-radius: 14px;
    border: 1px solid rgba(240, 208, 96, 0.3);
  }
  .ov-reward {
    font-size: 20px; font-weight: 900;
    color: #ffd700;
    margin: 4px 0;
  }
  .ov-btn {
    width: 100%; margin-top: 20px;
    padding: 14px;
    background: linear-gradient(135deg, #ba55d3, #6b3eb0);
    border: 2px solid #f0d060;
    border-radius: 14px;
    color: #fff;
    font-size: 17px; font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(186, 85, 211, 0.4);
  }

  /* ── STATS PANEL ──────────────────────────── */
  .stats-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 280;
    display: none; align-items: flex-start; justify-content: center;
    padding: 16px;
    overflow-y: auto;
  }
  .stats-overlay.open { display: flex; }
  .stats-card {
    max-width: 500px; width: 100%;
    background: linear-gradient(180deg, #2a1851, #1a0f3a);
    border: 2px solid #f0d060;
    border-radius: 20px;
    padding: 18px;
    color: #fff;
    box-shadow: 0 0 60px rgba(240, 208, 96, 0.4);
    margin-top: env(safe-area-inset-top);
  }
  .stats-head { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
  .stats-head h2 {
    flex: 1; font-size: 18px; font-weight: 900;
    color: #f0d060;
  }
  .stats-close {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff; font-size: 18px; cursor: pointer;
  }
  .stats-summary {
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 12px;
  }
  .stats-bar {
    height: 14px;
    background: rgba(0,0,0,0.4);
    border-radius: 7px; overflow: hidden;
    margin-top: 8px;
  }
  .stats-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #4ade80, #ffd700);
    transition: width 0.6s;
  }
  .stats-summary-text { font-size: 13px; color: #b9adcc; margin-top: 6px; }

  .stats-section { margin-bottom: 14px; }
  .stats-section h3 {
    font-size: 13px; font-weight: 800;
    letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .stats-section.trouble h3 { color: #ff6b6b; }
  .stats-section.progress h3 { color: #ffd700; }
  .stats-section.mastered h3 { color: #4ade80; }
  .stats-section.unseen h3 { color: #b9adcc; }

  .stats-list {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 13px;
    line-height: 1.7;
  }
  .stats-word-row {
    display: flex; justify-content: space-between;
    padding: 4px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .stats-word-row:last-child { border-bottom: none; }
  .stats-word-name { font-weight: 700; }
  .stats-word-meta { color: #b9adcc; font-size: 12px; }
  .stats-word-meta.bad { color: #ff8888; font-weight: 700; }
  .stats-words-inline { color: #b9adcc; font-size: 12px; line-height: 1.6; }

  .stats-action-btn {
    width: 100%; margin-top: 8px;
    padding: 12px;
    background: linear-gradient(135deg, #ff4444, #c01818);
    border: 2px solid #ff8888;
    border-radius: 12px;
    color: #fff;
    font-size: 15px; font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255, 68, 68, 0.3);
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 300;
    display: none; align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: #fff; border-radius: 18px; padding: 22px;
    max-width: 500px; width: 100%;
    max-height: 80vh; display: flex; flex-direction: column; color: #2a2118;

const PLAYER_HEARTS = 3
const STORAGE_KEY = "spelling-quest-v3"
const DAILY_GOAL = 10  // 每日答对目标

// ═══════════════════════════════════════════════════════════════════════
// MUTE & DAILY STREAK STATE
// ═══════════════════════════════════════════════════════════════════════
let isMuted = false
let dailyData = { date: "", correct: 0, streak: 0 }

function loadDailyData() {
  const raw = localStorage.getItem("spelling-quest-daily")
  const today = new Date().toISOString().slice(0, 10)
  if (raw) {
    try {
      const d = JSON.parse(raw)
      if (d.date === today) dailyData = d
      else if (d.date === getYesterday()) dailyData = { date: today, correct: 0, streak: d.streak + 1 }
      else dailyData = { date: today, correct: 0, streak: 0 }
    } catch { dailyData = { date: today, correct: 0, streak: 0 } }
  } else {
    dailyData = { date: today, correct: 0, streak: 0 }
  }
  saveDailyData()
}

function getYesterday() {
  const d = new Date(); d.setDate(d.getDate() - 1); return d.toISOString().slice(0, 10)
}

function saveDailyData() {
  localStorage.setItem("spelling-quest-daily", JSON.stringify(dailyData))
}

function onDailyCorrect() {
  const today = new Date().toISOString().slice(0, 10)
  if (dailyData.date !== today) {
    // 跨天：检查昨天是否达标
    const yesterday = getYesterday()
    const oldRaw = JSON.parse(localStorage.getItem("spelling-quest-daily") || '{}')
    if (oldRaw.date === yesterday && oldRaw.correct >= DAILY_GOAL) {
      dailyData.streak = (oldRaw.streak || 0) + 1
    } else if (oldRaw.date !== yesterday) {
      dailyData.streak = 0
    } else {
      dailyData.streak = oldRaw.streak || 0
    }
    dailyData.date = today
    dailyData.correct = 0
  }
  dailyData.correct++
  // 达标时给额外奖励
  if (dailyData.correct === DAILY_GOAL) {
    state.xp += 50
    state.coins += 10
  }
  saveDailyData()
  updateDailyBar()
}

function updateDailyBar() {
  const bar = document.getElementById("daily-bar")
  if (!bar) return
  bar.style.display = ""
  const streakEl = document.getElementById("daily-streak")
  const labelEl = document.getElementById("daily-goal-label")
  const fillEl = document.getElementById("daily-goal-fill")
  const doneEl = document.getElementById("daily-goal-done")
  if (dailyData.streak > 0) {
    streakEl.textContent = "🔥 " + dailyData.streak + " 天"
  } else {
    streakEl.textContent = ""
  }
  const pct = Math.min(100, Math.round((dailyData.correct / DAILY_GOAL) * 100))
  fillEl.style.width = pct + "%"
  if (dailyData.correct >= DAILY_GOAL) {
    labelEl.textContent = "今日目标 ✓ 已完成！"
    doneEl.textContent = "🎉"
  } else {
    labelEl.textContent = "今日目标：答对 " + dailyData.correct + " / " + DAILY_GOAL
    doneEl.textContent = ""
  }
}

// ═══════════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════════
let state = {
  words: [...DEFAULT_WORDS],
  progress: {},                       // 词的掌握情况
  xp: 0,
  coins: 0,
  questIndex: 0,                      // 当前打第几只怪 (cycles)
  defeatedCount: 0,                   // 累计打死多少怪
  defeatedIds: [],                    // 打死过的怪 id（去重）
  // 战斗内
  battle: null,                       // { monsterIdx, monsterHp, playerHearts, wordsUsed:[] }
  pendingMode: null,                  // 当前题目用哪个模式
  currentWordIdx: null,
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    words: state.words,
    progress: state.progress,
    xp: state.xp,
    coins: state.coins,
    questIndex: state.questIndex,
    defeatedCount: state.defeatedCount,
    defeatedIds: state.defeatedIds,
    isMuted: isMuted,
  }))
}

function loadState() {
  const raw = localStorage.getItem(STORAGE_KEY)
  if (!raw) return
  try {
    const d = JSON.parse(raw)
    if (Array.isArray(d.words)) state.words = d.words
    if (d.progress) state.progress = d.progress
    if (typeof d.xp === "number") state.xp = d.xp
    if (typeof d.coins === "number") state.coins = d.coins
    if (typeof d.questIndex === "number") state.questIndex = d.questIndex
    if (typeof d.defeatedCount === "number") state.defeatedCount = d.defeatedCount
    if (Array.isArray(d.defeatedIds)) state.defeatedIds = d.defeatedIds
    if (typeof d.isMuted === "boolean") isMuted = d.isMuted
  } catch {}
}

function getProgress(idx) {
  if (!state.progress[idx])
    state.progress[idx] = {
      correct: 0, wrong: 0, lastSeen: 0, mastered: false,
      consecutiveCorrect: 0,
      firstCorrect: 0,    // 第一次拼对的时间戳（用于判定"是否经过时间检验"）
    }
  return state.progress[idx]
}

// 真正掌握的标准（科学版）:
//  ① 至少答对 2 次
//  ② 连续答对 2 次（最近 2 次都对）
//  ③ 第一次答对到现在 ≥ 20 分钟（保证是"过段时间还记得"而非"刚学的肌肉记忆"）
const MASTERY_TIME_GAP_MS = 20 * 60 * 1000
function checkMastered(p) {
  if (p.correct < 2) return false
  if (p.consecutiveCorrect < 2) return false
  if (!p.firstCorrect) return false
  if (Date.now() - p.firstCorrect < MASTERY_TIME_GAP_MS) return false
  return true
}

function pickNextWord(excludeIds = []) {
  const items = state.words.map((w, idx) => ({ idx, p: getProgress(idx) }))
                          .filter((it) => !excludeIds.includes(it.idx))
  if (items.length === 0) return Math.floor(Math.random() * state.words.length)

  // 分桶
  const trouble   = items.filter((it) => it.p.wrong > 0 && !it.p.mastered)
                         .sort((a,b) => (a.p.lastSeen||0) - (b.p.lastSeen||0))
  const unseen    = items.filter((it) => it.p.correct === 0 && it.p.wrong === 0)
  const inProg    = items.filter((it) => it.p.correct > 0 && !it.p.mastered && it.p.wrong === 0)
                         .sort((a,b) => (a.p.lastSeen||0) - (b.p.lastSeen||0))
  const mastered  = items.filter((it) => it.p.mastered)
                         .sort((a,b) => (a.p.lastSeen||0) - (b.p.lastSeen||0))

  // 权重抽样: 35% 错词, 40% 新词, 20% 学习中, 5% 已掌握（防遗忘）
  // 关键: 即使有大量错词，每次也保证 40% 概率出新词
  const r = Math.random()
  let pool = null
  if (r < 0.35 && trouble.length > 0)        pool = trouble
  else if (r < 0.75 && unseen.length > 0)    pool = unseen
  else if (r < 0.95 && inProg.length > 0)    pool = inProg
  else if (mastered.length > 0)              pool = mastered

  // Fallback: 按优先级降级
  if (!pool || pool.length === 0) {
    pool = unseen.length    > 0 ? unseen
         : trouble.length   > 0 ? trouble
         : inProg.length    > 0 ? inProg
         : mastered.length  > 0 ? mastered
         : items
  }
  const top = pool.slice(0, Math.min(3, pool.length))
  return top[Math.floor(Math.random() * top.length)].idx
}

// ═══════════════════════════════════════════════════════════════════════
// SOUND (Web Audio API)
// ═══════════════════════════════════════════════════════════════════════
let audioCtx = null
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)()
  return audioCtx
}
function playTone(freq, dur, type = "sine", gain = 0.15) {
  try {
    const ctx = getCtx()
    const osc = ctx.createOscillator()
    const g = ctx.createGain()
    osc.type = type
    osc.frequency.setValueAtTime(freq, ctx.currentTime)
    g.gain.setValueAtTime(gain, ctx.currentTime)
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur)
    osc.connect(g); g.connect(ctx.destination)
    osc.start(); osc.stop(ctx.currentTime + dur)
  } catch {}
}
function playSound(kind) {
  if (kind === "attack") {
    // 出招 + 命中
    playTone(880, 0.05, "square", 0.1)
    setTimeout(() => playTone(200, 0.15, "sawtooth", 0.18), 60)
  } else if (kind === "hurt") {
    playTone(120, 0.3, "sawtooth", 0.15)
  } else if (kind === "defeat-monster") {
    [523, 659, 784, 1047, 1319].forEach((f, i) =>
      setTimeout(() => playTone(f, 0.15, "triangle", 0.14), i * 100))
  } else if (kind === "battle-start") {
    [261, 196, 261, 392].forEach((f, i) =>
      setTimeout(() => playTone(f, 0.2, "triangle", 0.12), i * 150))
  } else if (kind === "defeat-player") {
    [400, 300, 200].forEach((f, i) =>
      setTimeout(() => playTone(f, 0.3, "sawtooth", 0.12), i * 200))
  } else if (kind === "boss") {
    [80, 100, 60, 80, 100].forEach((f, i) =>
      setTimeout(() => playTone(f, 0.3, "sawtooth", 0.18), i * 150))
  }
}

// ═══════════════════════════════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════════════════════════════
function burstConfetti(x, y, count = 20, colors) {
  const host = document.getElementById("confetti-host")
  const palette = colors || ["#ffd700","#ff7eb9","#ba55d3","#6b3eb0","#ff6b00","#4a7c59"]
  for (let i = 0; i < count; i++) {
    const p = document.createElement("div")
    p.style.cssText = `
      position:fixed;width:8px;height:8px;border-radius:2px;
      left:${x}px;top:${y}px;background:${palette[i % palette.length]};
      pointer-events:none;z-index:200;opacity:0;
    `
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5
    const dist = 60 + Math.random() * 120
    p.style.transition = "transform 1.4s ease-out, opacity 1.4s ease-out"
    host.appendChild(p)
    requestAnimationFrame(() => {
      p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist+50}px) rotate(${Math.random()*720-360}deg)`
      p.style.opacity = "1"
      setTimeout(() => { p.style.opacity = "0" }, 700)
    })
    setTimeout(() => p.remove(), 1500)
  }
}

// ═══════════════════════════════════════════════════════════════════════
// TTS — 优先使用预生成 MP3（edge-tts, en-US-JennyNeural），降级到系统 TTS
// ═══════════════════════════════════════════════════════════════════════
let preferredVoice = null
function pickVoice() {
  const voices = speechSynthesis.getVoices()
  const priority = ["Samantha", "Allison", "Ava", "Susan", "Karen", "Google US English"]
  for (const name of priority) {
    const v = voices.find((vv) => vv.name.includes(name) && vv.lang.startsWith("en"))
    if (v) return v
  }
  return voices.find((v) => v.lang === "en-US") || voices.find((v) => v.lang.startsWith("en")) || null
}
speechSynthesis.addEventListener("voiceschanged", () => { preferredVoice = pickVoice() })
setTimeout(() => { if (!preferredVoice) preferredVoice = pickVoice() }, 500)

// 当前正在播放的 Audio 对象（用于中断前一个）
let _currentAudio = null

// ── 静音按钮 ─────────────────────────────
function updateMuteBtn() {
  const btn = document.getElementById("mute-btn")
  if (!btn) return
  btn.textContent = isMuted ? "🔇" : "🔊"
  btn.title = isMuted ? "取消静音" : "静音"
}
document.getElementById("mute-btn").onclick = () => {
  isMuted = !isMuted
  if (isMuted) { if (_currentAudio) { _currentAudio.pause(); _currentAudio = null }; speechSynthesis.cancel() }
  updateMuteBtn()
  saveState() // 顺便保存静音状态
}

function speak(text, opts = {}) {
  // 静音模式：直接回调，不播放任何声音
  if (isMuted) {
    if (opts.onstart) opts.onstart()
    if (opts.onend) setTimeout(() => opts.onend(), 100)
    return
  }
  // 先停止正在播放的内容
  if (_currentAudio) { _currentAudio.pause(); _currentAudio = null }
  speechSynthesis.cancel()

  // 尝试播放预生成 MP3
  const filename = text.trim().toLowerCase().replace(/[^a-z0-9]/g, "") + ".mp3"
  const audioUrl = "audio/" + filename
  const audio = new Audio(audioUrl)
  _currentAudio = audio

  audio.oncanplaythrough = () => {
    if (opts.onstart) opts.onstart()
  }
  audio.onended = () => {
    _currentAudio = null
    if (opts.onend) opts.onend()
  }
  audio.onerror = () => {
    // MP3 不存在 → 降级到 Web Speech API
    _currentAudio = null
    const u = new SpeechSynthesisUtterance(text)
    if (preferredVoice) u.voice = preferredVoice
    u.rate = opts.rate || 0.85
    u.pitch = 1; u.lang = "en-US"
    if (opts.onstart) u.onstart = opts.onstart
    if (opts.onend) u.onend = opts.onend
    speechSynthesis.speak(u)
  }
  audio.play().catch(() => {
    // 浏览器 autoplay 策略拦截时也降级
    _currentAudio = null
    const u = new SpeechSynthesisUtterance(text)
    if (preferredVoice) u.voice = preferredVoice
    u.rate = opts.rate || 0.85
    u.pitch = 1; u.lang = "en-US"
    if (opts.onstart) u.onstart = opts.onstart
    if (opts.onend) u.onend = opts.onend
    speechSynthesis.speak(u)
  })
  // 注意：MP3 路径存在时不调用 speechSynthesis.speak
}

// ─── Custom Keyboard 工具 ───────────────────────────
function buildKeyboardHtml(opts = {}) {
  // 3 行布局 - 类 QWERTY 但是按字母顺序更适合儿童
  const rows = [
    "qwertyuiop",
    "asdfghjkl",
    "zxcvbnm",
  ]
  const showGo = opts.showGo !== false
  return `
    <div class="keyboard" id="kb">
      ${rows.map((row, ri) => `
        <div class="kb-row">
          ${row.split("").map((l) => `<button class="key" data-l="${l}">${l}</button>`).join("")}
          ${ri === 2 ? `<button class="key special" data-act="back">⌫</button>` : ""}
        </div>
      `).join("")}
      ${showGo ? `<div class="kb-row">
        <button class="key special go" data-act="go" style="max-width:120px;">⚔️ ATTACK</button>
      </div>` : ""}
    </div>
  `
}

// 给键盘绑定事件
function wireKeyboard(onLetter, onBack, onGo) {
  const kb = document.getElementById("kb")
  if (!kb) return
  kb.querySelectorAll(".key").forEach((k) => {
    k.onclick = (e) => {
      e.preventDefault()
      const l = k.dataset.l
      const act = k.dataset.act
      if (l) onLetter && onLetter(l)
      else if (act === "back") onBack && onBack()
      else if (act === "go") onGo && onGo()
    }
  })
}

  }
  speakBtn.onclick = playWord
  document.getElementById("hear-again").onclick = playWord
  setTimeout(playWord, 200)

  const doAttack = () => {
    if (locked || !attempt) return
    locked = true
    const correct = attempt.toLowerCase() === word.word.toLowerCase()
    display.classList.add(correct ? "correct" : "wrong")
    refreshDisplay()
    // 锁住键盘
    document.querySelectorAll("#kb .key").forEach((k) => k.classList.add("dim"))
    if (correct) onAttackSuccess()
    else onAttackFail(word.word)
  }

  wireKeyboard(
    (l) => { if (locked) return; if (attempt.length < 30) attempt += l; refreshDisplay() },
    () => { if (locked) return; attempt = attempt.slice(0, -1); refreshDisplay() },
    doAttack,
  )
}

// ─── CHALLENGE: PUZZLE ────────────────────────────
function renderPuzzleChallenge() {
  const word = state.words[state.currentWordIdx]
  const area = document.getElementById("challenge-area")

  const shuffled = [...word.syllables].map((s, i) => ({ s, originalIdx: i }))
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1))
    ;[shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]]
  }
  if (shuffled.length > 1 && shuffled.every((x, i) => x.originalIdx === i))
    [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]]

  area.innerHTML = `
    <div class="challenge-card">
      <div class="challenge-mode">🧩 PUZZLE THE WORD</div>
      <div class="speak-row">
        <button class="speak-btn" id="speak">🔊</button>
      </div>
      <div class="meaning">${word.meaning}</div>
      <div class="puzzle-slots" id="slots"></div>
      <div class="puzzle-bank" id="bank"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="clear-btn">清空</button>
        <button class="btn btn-attack" id="attack-btn" disabled>⚔️ ATTACK</button>
      </div>
    </div>
  `

  const slotsEl = document.getElementById("slots")
  const bankEl = document.getElementById("bank")
  const attackBtn = document.getElementById("attack-btn")
  const speakBtn = document.getElementById("speak")
  let placed = []

  function renderPuzzle() {
    slotsEl.innerHTML = placed.length === 0
      ? `<div style="color:#bfad9c;align-self:center;font-size:13px;">点击下方音节拼成单词</div>`
      : placed.map((p, i) => `<div class="puzzle-slot" data-slot-idx="${i}">${p.s}</div>`).join("")
    bankEl.innerHTML = shuffled.map((piece, i) => {
      const used = placed.some((p) => p.bankIdx === i)
      return `<div class="puzzle-piece ${used?"used":""}" data-bank-idx="${i}">${piece.s}</div>`
    }).join("")
    slotsEl.querySelectorAll(".puzzle-slot").forEach((el) => {
      el.onclick = () => { placed.splice(+el.dataset.slotIdx, 1); renderPuzzle() }
    })
    bankEl.querySelectorAll(".puzzle-piece:not(.used)").forEach((el) => {
      el.onclick = () => { placed.push({ ...shuffled[+el.dataset.bankIdx], bankIdx: +el.dataset.bankIdx }); renderPuzzle() }
    })
    attackBtn.disabled = placed.length !== word.syllables.length
  }
  renderPuzzle()

  const playWord = () => {
    speakBtn.classList.add("speaking")
    speak(word.word, { onend: () => speakBtn.classList.remove("speaking") })
  }
  speakBtn.onclick = playWord
  setTimeout(playWord, 200)
  document.getElementById("clear-btn").onclick = () => { placed = []; renderPuzzle() }

  attackBtn.onclick = () => {
    attackBtn.disabled = true
    const correct = placed.every((p, i) => p.originalIdx === i)
    if (correct) onAttackSuccess()
    else onAttackFail(word.word)
  }
}

// ─── CHALLENGE: TRAP ──────────────────────────────
function renderTrapChallenge() {
  const word = state.words[state.currentWordIdx]
  const area = document.getElementById("challenge-area")
  const trapsToUse = (word.traps && word.traps.length > 0) ? word.traps : findAutoTraps(word)

  area.innerHTML = `
    <div class="challenge-card">
      <div class="challenge-mode">⚠️ FILL THE TRAPS</div>
      <div class="speak-row">
        <button class="speak-btn" id="speak">🔊</button>
      </div>
      <div class="meaning">${word.meaning}</div>
      <div class="trap-word" id="trap-word"></div>
      <div class="actions">
        <button class="btn btn-secondary" id="hear-again">🔊 听</button>
      </div>
      ${buildKeyboardHtml()}
    </div>
  `
  const wordEl = document.getElementById("trap-word")
  const speakBtn = document.getElementById("speak")

  // 用 span 替代 input，避免系统键盘
  wordEl.innerHTML = word.word.split("").map((c, i) =>
    trapsToUse.includes(i)
      ? `<span class="trap-blank" data-trap-idx="${i}" data-pos="${trapsToUse.indexOf(i)}"></span>`
      : `<span class="trap-letter">${c}</span>`
  ).join("")

  const blanks = [...wordEl.querySelectorAll(".trap-blank")]
  // 给 trap-blank 加点击聚焦视觉
  blanks.forEach((b) => { b.style.cursor = "pointer"; b.contentEditable = false })

  let currentBlank = 0
  let answers = blanks.map(() => "")
  let locked = false

  const refreshBlanks = () => {
    blanks.forEach((b, i) => {
      b.textContent = answers[i] || ""
      b.classList.remove("active")
      if (!locked && i === currentBlank) b.classList.add("active")
    })
  }
  // active 高亮样式（动态加点 CSS）
  if (!document.getElementById("trap-active-style")) {
    const s = document.createElement("style")
    s.id = "trap-active-style"
    s.textContent = `.trap-blank.active { background:#fff3cd !important; border-color:#ff8800 !important; box-shadow:0 0 0 3px rgba(255,136,0,0.3); }`
    document.head.appendChild(s)
  }
  refreshBlanks()

  const playWord = () => {
    speakBtn.classList.add("speaking")
    speak(word.word, { onend: () => speakBtn.classList.remove("speaking") })
  }
  speakBtn.onclick = playWord
  document.getElementById("hear-again").onclick = playWord
  setTimeout(playWord, 200)

  blanks.forEach((b, i) => { b.onclick = () => { if (!locked) { currentBlank = i; refreshBlanks() } } })

  const doSubmit = () => {
    if (locked) return
    if (answers.some((a) => !a)) {
      // 还有空白没填，跳到第一个空
      const firstEmpty = answers.findIndex((a) => !a)
      if (firstEmpty >= 0) { currentBlank = firstEmpty; refreshBlanks() }
      return
    }
    locked = true
    let allCorrect = true
    blanks.forEach((b, i) => {
      const idx = +b.dataset.trapIdx
      const expected = word.word[idx].toLowerCase()
      if (answers[i].toLowerCase() === expected) b.classList.add("correct")
      else { b.classList.add("wrong"); b.textContent = word.word[idx]; allCorrect = false }
    })
    document.querySelectorAll("#kb .key").forEach((k) => k.classList.add("dim"))
    if (allCorrect) onAttackSuccess()
    else onAttackFail(word.word)
  }

  wireKeyboard(
    (l) => {
      if (locked) return
      answers[currentBlank] = l
      if (currentBlank < blanks.length - 1) currentBlank++
      refreshBlanks()
    },
    () => {
      if (locked) return
      if (answers[currentBlank]) {
        answers[currentBlank] = ""
      } else if (currentBlank > 0) {
        currentBlank--
        answers[currentBlank] = ""
      }
      refreshBlanks()
    },
    doSubmit,
  )
}

function findAutoTraps(word) {
  const traps = []
  for (let i = 0; i < word.word.length; i++) if ("aeiouAEIOU".includes(word.word[i])) traps.push(i)
  return traps.slice(0, Math.min(5, Math.max(2, traps.length)))
}

// ═══════════════════════════════════════════════════════════════════════
// ATTACK RESOLUTION
// ═══════════════════════════════════════════════════════════════════════

// Guard: 防止同一局内多个 setTimeout 竞争触发 onPlayerDefeated / onMonsterDefeated
let battleEnded = false

function onAttackSuccess() {
  if (battleEnded) return
  const b = state.battle
  playSound("attack")
  const art = document.getElementById("monster-art")
  art.classList.add("hit")
  setTimeout(() => art.classList.remove("hit"), 500)
  showDamage("-1", false)
  b.monsterHp = Math.max(0, b.monsterHp - 1)
  const hpPct = (b.monsterHp / b.monsterHpMax) * 100
  document.getElementById("hp-fill").style.width = hpPct + "%"
  document.getElementById("hp-num").textContent = `${b.monsterHp}/${b.monsterHpMax}`

  // 记录词进度
  const p = getProgress(state.currentWordIdx)
  const wasMastered = p.mastered
  p.correct++
  p.lastSeen = Date.now()
  p.consecutiveCorrect = (p.consecutiveCorrect || 0) + 1
  if (!p.firstCorrect) p.firstCorrect = Date.now()
  p.mastered = checkMastered(p)
  b.wordsUsed.push(state.currentWordIdx)
  saveState()
  // 每日打卡
  onDailyCorrect()

  // 刚刚达成 mastered 的特殊反馈
  if (!wasMastered && p.mastered) {
    state.xp += 20
    state.coins += 3
    updateHeader()
    setTimeout(() => {
      burstConfetti(window.innerWidth/2, 250, 35, ["#ffd700","#4ade80","#ffd700"])
      showDamage("✨ MASTERED!", false)
    }, 200)
  }

  setTimeout(() => {
    if (battleEnded) return
    if (b.monsterHp <= 0) {
      battleEnded = true
      onMonsterDefeated()
    } else {
      nextChallenge()
    }
  }, 700)
}

function onAttackFail(correctWord) {
  if (battleEnded) return
  const b = state.battle
  playSound("hurt")
  // 玩家受伤
  b.playerHearts--
  const hearts = [...document.getElementById("hearts").children]
  if (hearts[b.playerHearts]) hearts[b.playerHearts].classList.add("lost")

  // 记录错的
  const p = getProgress(state.currentWordIdx)
  p.wrong++
  p.lastSeen = Date.now()
  p.consecutiveCorrect = 0   // 重置连击
  p.mastered = false
  b.wordsUsed.push(state.currentWordIdx)
  saveState()

  // 显示解析卡（音节 + 正确拼写 + 释义）
  const word = state.words[state.currentWordIdx]
  const cardEl = document.getElementById("challenge-area").querySelector(".challenge-card")
  if (cardEl) {
    // 音节高亮提示
    const syllHighlight = word.syllables.map((s, i) =>
      `<b>${s}</b>${i < word.syllables.length - 1 ? " - " : ""}`
    ).join("")
    const reviewDiv = document.createElement("div")
    reviewDiv.className = "review-card"
    reviewDiv.innerHTML = `
      <div class="review-title">⚠️ 答错了，正确答案：</div>
      <div class="review-correct">${correctWord}</div>
      <div class="review-syllables">音节拆分：${syllHighlight}</div>
      <div class="review-meaning">${word.meaning}</div>
    `
    cardEl.appendChild(reviewDiv)
  }

  setTimeout(() => {
    if (battleEnded) return
    if (b.playerHearts <= 0) {
      battleEnded = true
      onPlayerDefeated()
    } else {
      nextChallenge()
    }
  }, 2000)
}

function nextChallenge() {
  state.pendingMode = pickRandomMode()
  if (troubleOnlyMode && troubleWordPool && troubleWordPool.length > 0) {
    const recentExclude = state.battle.wordsUsed.slice(-Math.min(3, troubleWordPool.length - 1))
    const pool = troubleWordPool.filter((idx) => !recentExclude.includes(idx))
    state.currentWordIdx = pool.length > 0
      ? pool[Math.floor(Math.random() * pool.length)]
      : troubleWordPool[Math.floor(Math.random() * troubleWordPool.length)]
  } else {
    state.currentWordIdx = pickNextWord(state.battle.wordsUsed.slice(-3))
  }
  renderChallenge()
}

function showDamage(text, isHeal) {
  const container = document.getElementById("damage-container")
  if (!container) return
  const el = document.createElement("div")
  el.className = "damage-num" + (isHeal ? " heal" : "")
  el.textContent = text
  container.appendChild(el)
  setTimeout(() => el.remove(), 1200)
}

// ═══════════════════════════════════════════════════════════════════════
function onMonsterDefeated() {
  const m = state.battle.monster
  playSound("defeat-monster")
  const art = document.getElementById("monster-art")
  art.classList.remove("hit")
  art.classList.add("defeated")
  setTimeout(() => burstConfetti(window.innerWidth/2, 200, 50), 200)

  state.xp += m.xp
  state.coins += m.reward
  state.defeatedCount++
  if (!state.defeatedIds.includes(m.id)) state.defeatedIds.push(m.id)
  // 错词战斗不推进正式进度
  if (!troubleOnlyMode) state.questIndex++
  saveState()
  updateHeader()

  const wasTrouble = troubleOnlyMode
  troubleOnlyMode = false
  troubleWordPool = null

  setTimeout(() => {
    showOverlay({
      emoji: m.boss ? "👑" : "🏆",

      msg: wasTrouble
        ? `🎯 你把错词都打回去了！<br>继续挑战常规怪物 →`
        : `你打败了 <b>${m.name}</b>！`,
      rewards: [`+${m.xp} ⭐ XP`, `+${m.reward} 🪙 金币`],
      btnText: "下一关 →",
      onClick: () => { hideOverlay(); startBattle() },
    })
  }, 1400)
}

function onPlayerDefeated() {
  playSound("defeat-player")
  setTimeout(() => {
    showOverlay({
      emoji: "💀",
      title: "Quest Failed",
      msg: `${state.battle.monster.name} 赢了这一回合...<br>但每次失败都让你更强！`,

      btnText: "再战一次 🪄",

// ═══════════════════════════════════════════════════════════════════════
// STATS PANEL — 进度 + 错词回看
// ═══════════════════════════════════════════════════════════════════════
let troubleOnlyMode = false   // true 时只从错词池抽词

function renderStatsPanel() {
  const buckets = { trouble: [], almost: [], progress: [], mastered: [], unseen: [] }
  state.words.forEach((w, idx) => {
    const p = state.progress[idx]
    if (!p || (p.correct === 0 && p.wrong === 0)) {
      buckets.unseen.push({ w, idx, p: null })
    } else if (p.mastered) {
      buckets.mastered.push({ w, idx, p })
    } else if (p.consecutiveCorrect >= 2 && p.correct >= 2 && !p.mastered) {
      // 连对 2 次了但还差时间检验 → 「快掌握了」
      buckets.almost.push({ w, idx, p })
    } else if (p.wrong > 0) {
      buckets.trouble.push({ w, idx, p })
    } else {
      buckets.progress.push({ w, idx, p })
    }
  })
  buckets.trouble.sort((a, b) => b.p.wrong - a.p.wrong)
  buckets.almost.sort((a, b) => (a.p.firstCorrect||0) - (b.p.firstCorrect||0))

  const total = state.words.length
  const masteredCount = buckets.mastered.length
  const pct = total > 0 ? Math.round((masteredCount / total) * 100) : 0

  const card = document.getElementById("stats-card")
  card.innerHTML = `
    <div class="stats-head">
      <h2>📊 学习进度</h2>
      <button class="stats-close" id="stats-close">✕</button>
    </div>

    <div class="stats-summary">
      <div style="display:flex;justify-content:space-between;font-weight:800;">
        <span>掌握度</span>
        <span style="color:#4ade80;">${masteredCount} / ${total}</span>
      </div>
      <div class="stats-bar"><div class="stats-bar-fill" style="width:${pct}%"></div></div>
      <div class="stats-summary-text">
        🏆 累计打死 ${state.defeatedCount} 只怪 · ⭐ ${state.xp} XP · 🪙 ${state.coins}
      </div>
    </div>

    ${buckets.trouble.length > 0 ? `
      <div class="stats-section trouble">
        <h3>❌ 还要练 (${buckets.trouble.length})</h3>
        <div class="stats-list">
          ${buckets.trouble.map((b) => `
            <div class="stats-word-row">
              <span class="stats-word-name">${b.w.word}</span>
              <span class="stats-word-meta bad">错 ${b.p.wrong} 次</span>
            </div>
          `).join("")}
        </div>
        <button class="stats-action-btn" id="battle-trouble">⚔️ 挑战这 ${buckets.trouble.length} 个错词</button>
      </div>
    ` : ""}

    ${buckets.almost.length > 0 ? `
      <div class="stats-section" style="--stats-color:#ffd700;">
        <h3 style="color:#ffd700;">🟡 快掌握了 (${buckets.almost.length})</h3>
        <div class="stats-list">
          ${buckets.almost.map((b) => {
            const minSinceFirst = Math.floor((Date.now() - (b.p.firstCorrect||0)) / 60000)
            const minLeft = Math.max(0, 20 - minSinceFirst)
            return `<div class="stats-word-row">
              <span class="stats-word-name">${b.w.word}</span>
              <span class="stats-word-meta">${minLeft > 0 ? `${minLeft} 分钟后再练就毕业` : "现在再练就毕业 ✨"}</span>
            </div>`
          }).join("")}
        </div>
      </div>
    ` : ""}

    ${buckets.progress.length > 0 ? `
      <div class="stats-section progress">
        <h3>⏳ 学习中 (${buckets.progress.length})</h3>
        <div class="stats-list">
          <div class="stats-words-inline">${buckets.progress.map((b) => b.w.word).join(" · ")}</div>
        </div>
      </div>
    ` : ""}

    ${buckets.mastered.length > 0 ? `
      <div class="stats-section mastered">
        <h3>✅ 已掌握 (${buckets.mastered.length})</h3>
        <div class="stats-list">
          <div class="stats-words-inline">${buckets.mastered.map((b) => b.w.word).join(" · ")}</div>
        </div>
      </div>
    ` : ""}

    ${buckets.unseen.length > 0 ? `
      <div class="stats-section unseen">
        <h3>💭 还没遇到 (${buckets.unseen.length})</h3>
        <div class="stats-list">
          <div class="stats-words-inline">${buckets.unseen.map((b) => b.w.word).join(" · ")}</div>
        </div>
      </div>
    ` : ""}

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);">
      <button class="stats-action-btn" id="reset-progress" style="background:linear-gradient(135deg,#666,#444);border-color:#888;">
        🔄 重置词的进度（保留 XP & 金币）
      </button>
    </div>
  `

  document.getElementById("stats-close").onclick = hideStats
  const btn = document.getElementById("battle-trouble")
  if (btn) {
    btn.onclick = () => {
      hideStats()
      startTroubleBattle(buckets.trouble.map((b) => b.idx))
    }
  }
  const resetBtn = document.getElementById("reset-progress")
  if (resetBtn) {
    resetBtn.onclick = () => {
      if (!confirm("把所有词的对错次数清零，重新开始练习？\n(XP 和金币会保留)")) return
      state.progress = {}
      saveState()
      hideStats()
      startBattle()
    }
  }
}

function showStats() {
  renderStatsPanel()
  document.getElementById("stats-overlay").classList.add("open")
}
function hideStats() {
  document.getElementById("stats-overlay").classList.remove("open")
}

// ═══════════════════════════════════════════════════════════════════════
// MODAL (词表管理)
// ═══════════════════════════════════════════════════════════════════════
const modal = document.getElementById("modal")
const wordInput = document.getElementById("word-input")
document.getElementById("settings-btn").onclick = () => {
  wordInput.value = state.words.map((w) => w.word).join("\n")
  modal.classList.add("open")
}
document.getElementById("modal-cancel").onclick = () => modal.classList.remove("open")
document.getElementById("modal-reset").onclick = () => {
  if (!confirm("恢复默认 40 词？XP 和金币保留。")) return
  state.words = [...DEFAULT_WORDS]
  state.progress = {}
  saveState()
  modal.classList.remove("open")
  startBattle()
}
document.getElementById("modal-save").onclick = () => {
  const lines = wordInput.value.split("\n").map((l) => l.trim()).filter(Boolean)
  if (!lines.length) { alert("至少输入一个单词"); return }
  state.words = lines.map((w) => {
    const existing = DEFAULT_WORDS.find((d) => d.word.toLowerCase() === w.toLowerCase())
    if (existing) return existing
    return { word: w, syllables: autoSyllables(w), stress: 0, traps: [], meaning: "", example: "" }
  })
  state.progress = {}
  saveState()
  modal.classList.remove("open")
  startBattle()
}
function autoSyllables(word) {
  const vowels = "aeiouy"
  const groups = []; let cur = ""; let lastWasVowel = null
  for (const c of word.toLowerCase()) {
    const isV = vowels.includes(c)
    if (lastWasVowel !== null && lastWasVowel !== isV && cur.length >= 2 && isV) {
      groups.push(cur); cur = c
    } else cur += c
    lastWasVowel = isV
  }
  if (cur) groups.push(cur)
  return groups.length > 0 ? groups : [word]
}
